name: Build and Release Tauri App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above)
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs
            args: '--target x86_64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            args: ''
            rust-targets: ''
          - platform: 'ubuntu-24.04-arm'
            args: ''
            rust-targets: ''
          - platform: 'windows-latest'
            args: ''
            rust-targets: ''
          - platform: 'windows-latest' # for ARM based Windows
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src/tauri -> target'

      - name: Cache Tauri bundler tools
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/tauri
            ~/AppData/Local/tauri
          key: ${{ runner.os }}-tauri-tools-v2

      - name: Install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2 file wget desktop-file-utils

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DevWP ${{ github.ref_name }}'
          releaseBody: |
            ## Installation

            ### Windows
            - **x64 installer**: Download `DevWP_x.x.x_x64-setup.exe` and run it.
            - **x64 MSI**: Download `DevWP_x.x.x_x64.msi` and run it.
            - **ARM64 installer**: Download `DevWP_x.x.x_arm64-setup.exe` and run it.
            - **ARM64 MSI**: Download `DevWP_x.x.x_arm64.msi` and run it.

            ### macOS
            - **Apple Silicon (M1/M2/M3)**: Download `DevWP_x.x.x_aarch64.dmg`, open it, and drag DevWP to Applications.
            - **Intel**: Download `DevWP_x.x.x_x64.dmg`, open it, and drag DevWP to Applications.

            ### Linux
            - **AppImage (x86_64)**: Download `DevWP_x.x.x_amd64.AppImage`, make it executable (`chmod +x`), and run it.
            - **RPM (x86_64)**: Download `DevWP_x.x.x-1.x86_64.rpm` and install with `sudo rpm -i DevWP_x.x.x-1.x86_64.rpm`.
            - **Tarball (x86_64)**: Download `DevWP_x.x.x-x86_64.tar.gz` and extract with `tar -xzf DevWP_x.x.x-x86_64.tar.gz`.
            - **AppImage (ARM64)**: Download `DevWP_x.x.x_aarch64.AppImage`, make it executable (`chmod +x`), and run it.
            - **RPM (ARM64)**: Download `DevWP_x.x.x-1.aarch64.rpm` and install with `sudo rpm -i DevWP_x.x.x-1.aarch64.rpm`.
            - **Tarball (ARM64)**: Download `DevWP_x.x.x-aarch64.tar.gz` and extract with `tar -xzf DevWP_x.x.x-aarch64.tar.gz`.

            > **Requirement**: [Docker Desktop](https://www.docker.com/products/docker-desktop/) must be installed and running.
          releaseDraft: false
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name,
            '-alpha') }}
          args: ${{ matrix.args }}
          projectPath: src/tauri
