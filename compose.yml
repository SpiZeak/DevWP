x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  php:
    container_name: devwp_php
    build:
      context: ./config/php
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    expose:
      - 9000
    volumes:
      - ~/www:/src/www:rw
      - ./config/php/php.ini:/usr/local/etc/php/php.ini:ro
      - ./config/php/conf.d/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - ./config/php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
      - ~/.ssh:/home/appuser/.ssh:ro
      - ~/.config/composer:/home/appuser/.config/composer:ro
      - ./config/php/php-fpm.d/zz-devwp.conf:/usr/local/etc/php-fpm.d/zz-devwp.conf:ro
    logging: *default-logging
    healthcheck:
      test: ['CMD-SHELL', 'pidof php-fpm || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mariadb:
    container_name: devwp_mariadb
    image: mariadb:13.0-rc
    environment:
      MARIADB_ROOT_HOST: 'localhost'
      MARIADB_ROOT_PASSWORD: root
      MARIADB_AUTO_UPGRADE: true
      TZ: Europe/Stockholm
    volumes:
      - mariadb:/var/lib/mysql
      - ./config/mariadb/files:/src:ro
    ports:
      - '3306:3306'
    tmpfs:
      - /tmp
    command: --bind-address=0.0.0.0 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-name-resolve --innodb-flush-log-at-trx-commit=2 --innodb-flush-method=O_DIRECT --innodb-buffer-pool-size=512M
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'mariadb-admin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    container_name: devwp_redis
    image: redis:alpine
    ports:
      - '6379:6379'
    command: redis-server
    volumes:
      - redis:/data
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    container_name: devwp_nginx
    build:
      context: ./config/nginx
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    ports:
      - '80:80'
      - '443:443/tcp'
      - '443:443/udp'
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/global/:/etc/nginx/global/:ro
      - ./config/nginx/conf.d/:/etc/nginx/conf.d/:ro
      - ./config/nginx/sites-enabled/:/etc/nginx/sites-enabled/:rw
      - ./config/certs:/certs:ro
      - ~/www:/src/www:rw
    depends_on:
      php:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mailpit:
    container_name: devwp_mailpit
    image: axllent/mailpit
    expose:
      - '1025' # smtp server
    ports:
      - '8025:8025' # web ui
    environment:
      - TZ=Europe/Stockholm
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8025/api/v1/info']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mariadb:
  redis:
